name: fyp_skin
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  - pip
  - cudatoolkit=11.8
  - pytorch=2.0.1
  - torchvision=0.15.2
  - torchaudio=2.0.2
  - pytorch-cuda=11.8
  - numpy=1.23.5
  - pip:
      # --- Basic Image Processing ---
      - opencv-python-headless
      - matplotlib
      - scikit-image
      - scikit-learn
      - pandas
      - tqdm
      
      # --- SAM Dependencies ---
      - git+https://github.com/facebookresearch/segment-anything.git
      
      # --- LaMa Dependencies (Legacy compatibility) ---
      - omegaconf
      - hydra-core
      - pytorch-lightning==1.8.6
      - albumentations==0.5.2
      - kornia
      - easydict
      - pyre-extensions
      - typed-ast
      - joblib
      - scikit-video
      
      # --- VM-UNet & Mamba Dependencies ---
      - timm==0.9.2
      - packaging
      - einops
      
      # --- Jupyter Kernel Support ---
      - ipykernel